<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hongik Corridor Bamtify</title>
    <link href="./css/corridor.css" rel="stylesheet" />
    <script src="./js/corridor.js" defer></script>
  </head>
  <body>
    <nav class="page-nav" aria-label="페이지 이동">
      <a class="page-nav-link page-nav-left" href="./index.html">home</a>
      <a class="page-nav-link page-nav-right" href="./classroom-door.html"
        >강의실 문앞</a
      >
    </nav>
    <div class="click-guide">"Click to Bamtify"</div>
    <main class="corridor-strip" aria-label="홍익시디 복도 밤티파이">
      <section class="corridor-scene">
        <img
          class="corridor-base"
          src="./images/corridor_original.png"
          alt="홍익대학교 시각디자인과 복도 원본"
        />

        <button
          class="hotspot hotspot-guide-left"
          type="button"
          data-target="guide-left"
          aria-label="왼쪽 안내판 밤티파이"
        ></button>
        <button
          class="hotspot hotspot-logo"
          type="button"
          data-target="logo"
          aria-label="중앙 로고 밤티파이"
        ></button>
        <button
          class="hotspot hotspot-floor"
          type="button"
          data-target="floor-number"
          aria-label="층수 표기 밤티파이"
        ></button>
        <button
          class="hotspot hotspot-trashcan"
          type="button"
          data-target="trashcan"
          aria-label="분리수거함 밤티파이"
        ></button>
        <button
          class="hotspot hotspot-guide-right"
          type="button"
          data-target="guide-right"
          aria-label="오른쪽 안내판 밤티파이"
        ></button>

        <img
          class="bamtify-piece piece-guide-left"
          src="./images/guide_left.png"
          alt=""
          aria-hidden="true"
          data-piece="guide-left"
        />
        <img
          class="bamtify-piece piece-logo"
          src="./images/logo.png"
          alt=""
          aria-hidden="true"
          data-piece="logo"
        />
        <img
          class="bamtify-piece piece-trashcan"
          src="./images/trashcan.png"
          alt=""
          aria-hidden="true"
          data-piece="trashcan"
        />
        <img
          class="bamtify-piece piece-floor"
          src="./images/floor-number.png"
          alt=""
          aria-hidden="true"
          data-piece="floor-number"
        />
        <img
          class="bamtify-piece piece-guide-right"
          src="./images/guide_right.png"
          alt=""
          aria-hidden="true"
          data-piece="guide-right"
        />

        <div class="weird-flash" aria-hidden="true"></div>
      </section>
    </main>
  </body>
</html>
